name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx ng build --base-href /

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 77.42.127.29
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dist/uohub/browser/*
          target: /var/www/html/
          strip_components: 3
